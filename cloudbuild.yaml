steps:
- name: "gcr.io/cloud-builders/docker"

  # naming convention: <location>-<docker.pkg.dev/project_id/repo_name/image_name>:<tag> like latest or v1.0.0
  args: ["build", "-t", "europe-west4-docker.pkg.dev/${PROJECT_ID}/pyapprepo-artifact/pyappimage:latest", "."]


- name: "gcr.io/cloud-builders/docker"
  args: ["push", "europe-west4-docker.pkg.dev/${PROJECT_ID}/pyapprepo-artifact/pyappimage:latest"]


- name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
  entrypoint: gcloud
  args:
  - "run"
  - "deploy"
  - "pyfastapiapp"
  - "--image"
  - "europe-west4-docker.pkg.dev/${PROJECT_ID}/pyapprepo-artifact/pyappimage:latest"
  - "--region"
  - "europe-west4"
  - "--allow-unauthenticated"

options:
  logging: CLOUD_LOGGING_ONLY